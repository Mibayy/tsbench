<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Token Savior — OG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1200px;height:630px;overflow:hidden}
body{
  background:#0c0c0d;
  color:#ededed;
  font-family:'Geist',system-ui,-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;
  position:relative;
}
/* subtle grid background */
.grid{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
  background-size:48px 48px;
  mask-image:radial-gradient(ellipse at 50% 50%, #000 40%, transparent 80%);
  -webkit-mask-image:radial-gradient(ellipse at 50% 50%, #000 40%, transparent 80%);
}
/* purple glow */
.glow{
  position:absolute;width:800px;height:800px;
  left:50%;top:50%;transform:translate(-50%,-50%);
  background:radial-gradient(circle, rgba(139,92,246,.18) 0%, rgba(139,92,246,0) 60%);
  pointer-events:none;
}
.container{
  position:relative;z-index:1;
  width:100%;height:100%;
  padding:56px 64px;
  display:flex;flex-direction:column;justify-content:space-between;
}
/* header */
.header{display:flex;align-items:center;gap:12px}
.dot{
  width:16px;height:16px;border-radius:50%;
  background:linear-gradient(135deg,#8b5cf6 0%,#a78bfa 100%);
  box-shadow:0 0 24px rgba(139,92,246,.6);
}
.brand{
  font-family:'Geist Mono',monospace;
  font-size:20px;font-weight:700;letter-spacing:-.01em;color:#ededed;
}
/* center block */
.center{
  flex:1;display:flex;flex-direction:column;justify-content:center;
}
.tagline{
  font-size:54px;font-weight:900;letter-spacing:-.035em;line-height:1.05;
  margin-bottom:48px;
}
.tagline .grad{
  background:linear-gradient(135deg,#8b5cf6 0%,#a78bfa 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.stats{
  display:grid;grid-template-columns:repeat(3,1fr);gap:0;
  border-top:1px solid #2a2a2d;border-bottom:1px solid #2a2a2d;
  padding:28px 0;
}
.stat{text-align:left;padding:0 24px;border-right:1px solid #2a2a2d;}
.stat:first-child{padding-left:0}
.stat:last-child{border-right:none}
.stat .v{
  font-size:58px;font-weight:800;letter-spacing:-.04em;line-height:1;
  font-feature-settings:"tnum" 1;
}
.stat .v.green{color:#4ade80}
.stat .v.purple{color:#a78bfa}
.stat .l{
  margin-top:10px;font-size:14px;color:#888;
  text-transform:uppercase;letter-spacing:.08em;font-weight:500;
}
.subline{
  margin-top:22px;
  font-size:18px;color:#888;
}
/* footer */
.footer{display:flex;align-items:center;justify-content:space-between}
.badge{
  display:inline-flex;align-items:center;gap:8px;
  padding:8px 14px;border-radius:6px;
  background:rgba(139,92,246,.1);
  border:1px solid rgba(139,92,246,.25);
  font-family:'Geist Mono',monospace;font-size:13px;color:#a78bfa;font-weight:600;
  letter-spacing:.02em;
}
.badge .sep{color:#555}
.url{
  font-family:'Geist Mono',monospace;font-size:13px;color:#555;
}
</style>
</head>
<body>
<div class="grid"></div>
<div class="glow"></div>

<div class="container">
  <div class="header">
    <div class="dot"></div>
    <div class="brand">token-savior</div>
  </div>

  <div class="center">
    <div class="tagline"><span class="grad">Less context,</span><br>better answers.</div>

    <div class="stats">
      <div class="stat">
        <div class="v green">&minus;84%</div>
        <div class="l">Chars injected</div>
      </div>
      <div class="stat">
        <div class="v purple">56 &rarr; 96%</div>
        <div class="l">Accuracy</div>
      </div>
      <div class="stat">
        <div class="v green">&minus;45%</div>
        <div class="l">Wall time</div>
      </div>
    </div>

    <div class="subline">Measured across 60 real coding tasks &middot; Claude Sonnet</div>
  </div>

  <div class="footer">
    <div class="badge">Open benchmark <span class="sep">&middot;</span> tsbench v1.1</div>
    <div class="url">github.com/Mibayy/tsbench</div>
  </div>
</div>
</body>
</html>
